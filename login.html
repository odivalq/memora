<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memora - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <!-- Supabase Client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="auth-page">
  <!-- Container de Autenticação -->
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-header">
        <div class="logo-icon-large">M</div>
        <h1>Me<span>mora</span></h1>
        <p>Enciclopédia Colaborativa</p>
      </div>

      <!-- Abas de Login/Registro -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Login
        </button>
        <button class="auth-tab" data-tab="signup">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
          Criar Conta
        </button>
      </div>

      <!-- Formulário de Login -->
      <form id="loginForm" class="auth-form active" data-form="login">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input 
            type="email" 
            id="loginEmail" 
            placeholder="seu@email.com" 
            required
          >
          <span class="form-error" id="loginEmailError"></span>
        </div>

        <div class="form-group">
          <label for="loginPassword">Senha</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="loginPassword" 
              placeholder="Sua senha" 
              required
            >
            <button 
              type="button" 
              class="toggle-password" 
              data-input="loginPassword"
              title="Mostrar/Ocultar senha"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <span class="form-error" id="loginPasswordError"></span>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="rememberMe" checked>
            Manter-me conectado
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          Entrar
        </button>

        <div class="auth-divider">ou</div>

        <button type="button" class="btn btn-secondary btn-block" id="switchToSignup">
          Criar uma nova conta
        </button>

        <a href="password-reset.html" class="auth-link">Esqueci minha senha</a>

        <div class="form-message success" id="loginSuccess" style="display: none;"></div>
        <div class="form-message error" id="loginError"></div>
      </form>

      <!-- Formulário de Registro -->
      <form id="signupForm" class="auth-form" data-form="signup">
        <div class="form-group">
          <label for="signupNickname">Nome de Usuário (Apelido)</label>
          <input 
            type="text" 
            id="signupNickname" 
            placeholder="Seu apelido" 
            required
            minlength="3"
            maxlength="30"
          >
          <small>3-30 caracteres</small>
          <span class="form-error" id="signupNicknameError"></span>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input 
            type="email" 
            id="signupEmail" 
            placeholder="seu@email.com" 
            required
          >
          <span class="form-error" id="signupEmailError"></span>
        </div>

        <div class="form-group">
          <label for="signupPassword">Senha</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="signupPassword" 
              placeholder="Crie uma senha forte" 
              required
              minlength="8"
            >
            <button 
              type="button" 
              class="toggle-password" 
              data-input="signupPassword"
              title="Mostrar/Ocultar senha"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <small>Mínimo 8 caracteres</small>
          <span class="form-error" id="signupPasswordError"></span>
        </div>

        <div class="form-group">
          <label for="signupPasswordConfirm">Confirmar Senha</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="signupPasswordConfirm" 
              placeholder="Confirme sua senha" 
              required
            >
            <button 
              type="button" 
              class="toggle-password" 
              data-input="signupPasswordConfirm"
              title="Mostrar/Ocultar senha"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <span class="form-error" id="signupPasswordConfirmError"></span>
        </div>

        <div class="password-strength-meter">
          <div class="password-strength-bar" id="passwordStrengthBar"></div>
          <small id="passwordStrengthText"></small>
        </div>

        <div class="form-group checkbox">
          <label>
            <input type="checkbox" id="agreeTerms" required>
            Concordo com os <span>Termos de Serviço</span>
          </label>
          <span class="form-error" id="agreeTermsError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="signupBtn">
          Criar Conta
        </button>

        <button type="button" class="btn btn-secondary btn-block" id="switchToLogin">
          Já tenho conta
        </button>

        <div class="form-message success" id="signupSuccess" style="display: none;"></div>
        <div class="form-message error" id="signupError"></div>
      </form>
    </div>

    <!-- Informações Adicionais -->
    <div class="auth-info">
      <div class="info-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <div>
          <h4>Seguro</h4>
          <p>Suas senhas são criptografadas com segurança</p>
        </div>
      </div>
      <div class="info-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <div>
          <h4>Colaborativo</h4>
          <p>Trabalhe com sua equipe em tempo real</p>
        </div>
      </div>
      <div class="info-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path>
        </svg>
        <div>
          <h4>Simples</h4>
          <p>Interface intuitiva para sua equipe</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
