<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memora - Nicho</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <!-- Supabase Client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="dashboard.html" class="logo">
          <div class="logo-icon">🏠</div>
          <div class="logo-text">Me<span>mora</span></div>
        </a>
        
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar no nicho..." autocomplete="off">
          <button type="button" id="searchBtn" title="Buscar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
        </div>

        <div class="header-actions">
          <a href="editar.html" class="btn btn-primary" id="btnNovaEntrada">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            Nova Entrada
          </a>

          <a href="dashboard.html" class="btn btn-secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Meus Nichos
          </a>

          <!-- Menu de Usuário -->
          <div class="user-menu">
            <button class="user-menu-btn" id="userMenuBtn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span id="userMenuLabel">Menu</span>
            </button>
            <div class="user-menu-dropdown" id="userMenuDropdown">
              <div class="user-info" id="userInfo">
                <div class="user-name" id="userName"></div>
                <div class="user-email" id="userEmail"></div>
              </div>
              <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Nicho Banner -->
  <section id="nichoBanner" class="nicho-banner hidden">
    <div class="container">
      <div class="nicho-banner-content">
        <div class="nicho-banner-info">
          <span class="nicho-banner-icone" id="nichoBannerIcone"></span>
          <div>
            <h1 class="nicho-banner-nome" id="nichoBannerNome"></h1>
            <p class="nicho-banner-desc" id="nichoBannerDesc"></p>
          </div>
        </div>
        <div class="nicho-banner-acoes">
          <div class="membros-preview" id="membrosPreview"></div>
          <button type="button" class="btn btn-secondary btn-sm" id="btnCompartilhar" style="display:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            Compartilhar
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Conteúdo Principal -->
  <main class="main-content">
    <div class="container">
      
      <!-- Seção de Busca Ativa -->
      <div id="searchResultsSection" class="hidden">
        <div class="resultados-busca">
          <div class="resultados-contador" id="searchResultsCount"></div>
          <div id="searchResultsList"></div>
        </div>
      </div>

      <!-- Seção de Categorias -->
      <div id="categoriesSection">
        <h2 class="section-title">
          <span>📂</span>
          Categorias
        </h2>
        <div class="categorias-grid" id="categoriasGrid">
          <!-- Categorias serão carregadas via JavaScript -->
        </div>
      </div>

      <!-- Seção de Todas as Entradas -->
      <div id="allEntriesSection" class="hidden">
        <h2 class="section-title">
          <span>📄</span>
          Todas as Entradas
        </h2>
        <div class="resultados-busca">
          <div id="allEntriesList"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Memora- Sua enciclopédia colaborativa. Acesse e edite de qualquer lugar.</p>
    </div>
  </footer>

  <!-- Modal Compartilhar -->
  <div class="modal-overlay" id="modalCompartilharOverlay">
    <div class="modal modal-compartilhar">
      <div class="modal-header">
        <h3 class="modal-titulo" id="modalCompartilharTitulo">Compartilhar Nicho</h3>
        <button type="button" class="modal-close" id="modalCompartilharClose" aria-label="Fechar">&#x2715;</button>
      </div>

      <div class="compartilhar-campo">
        <label for="compartilharInput">Buscar usuário pelo nickname</label>
        <div class="compartilhar-input-wrapper">
          <input type="text" id="compartilharInput" placeholder="Digite um nickname..." autocomplete="off">
          <div class="compartilhar-dropdown hidden" id="compartilharDropdown"></div>
        </div>
      </div>

      <div class="usuario-selecionado hidden" id="usuarioSelecionado">
        <div class="dropdown-item-avatar" id="usuarioSelecionadoAvatar"></div>
        <div class="usuario-selecionado-info">
          <div class="usuario-selecionado-nome" id="usuarioSelecionadoNome"></div>
          <div class="usuario-selecionado-email" id="usuarioSelecionadoEmail"></div>
        </div>
        <button type="button" class="usuario-selecionado-limpar" id="btnLimparSelecao" title="Remover seleção">&#x2715;</button>
      </div>

      <div class="compartilhar-membros" id="compartilharMembros">
        <p class="compartilhar-membros-titulo">Membros atuais</p>
        <div id="compartilharMembrosLista"></div>
      </div>

      <div class="modal-acoes" style="margin-top: 20px;">
        <button type="button" class="btn btn-secondary" id="btnCancelarCompartilhar">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnConfirmarCompartilhar" disabled>Enviar convite</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app-nicho.js"></script>
  <script>
    // Inicialização de Autenticação
    document.addEventListener('DOMContentLoaded', async function () {
      // Verificar se o usuário está autenticado
      const usuario = await verificarAutenticacao();
      
      if (!usuario) {
        return; // Será redirecionado em verificarAutenticacao
      }

      // Carregar informações do usuário
      const dadosUsuario = await obterDadosUsuario(usuario.id);
      
      // Atualizar interface com informações do usuário
      const userName = document.getElementById('userName');
      const userEmail = document.getElementById('userEmail');
      const userMenuLabel = document.getElementById('userMenuLabel');

      if (userName && dadosUsuario) {
        userName.textContent = dadosUsuario.nickname || usuario.email;
        userMenuLabel.textContent = '👤 ' + (dadosUsuario.nickname || usuario.email.split('@')[0]);
      }

      if (userEmail) {
        userEmail.textContent = usuario.email;
      }

      // Configurar logout
      const logoutBtn = document.getElementById('logoutBtn');
      const userMenuBtn = document.getElementById('userMenuBtn');
      const userMenuDropdown = document.getElementById('userMenuDropdown');

      if (logoutBtn) {
        logoutBtn.addEventListener('click', async function (e) {
          e.preventDefault();
          
          try {
            await fazerLogout();
            window.location.href = 'login.html';
          } catch (error) {
            alert('Erro ao fazer logout: ' + error.message);
          }
        });
      }

      // Toggle do menu de usuário
      if (userMenuBtn) {
        userMenuBtn.addEventListener('click', function () {
          if (userMenuDropdown) {
            userMenuDropdown.classList.toggle('active');
          }
        });
      }

      // Fechar menu ao clicar fora
      document.addEventListener('click', function (e) {
        if (userMenuDropdown && !userMenuDropdown.contains(e.target) && !userMenuBtn.contains(e.target)) {
          userMenuDropdown.classList.remove('active');
        }
      });
    });
  </script>
</body>
</html>
