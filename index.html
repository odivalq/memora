<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memora - Enciclopédia Colaborativa</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <!-- Supabase Client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <div class="logo-icon">M</div>
          <div class="logo-text">Me<span>mora</span></div>
        </a>
        
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar entradas..." autocomplete="off">
          <button type="button" id="searchBtn" title="Buscar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
        </div>
        
        <a href="editar.html" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          Nova Entrada
        </a>
      </div>
    </div>
  </header>

  <!-- Conteúdo Principal -->
  <main class="main-content">
    <div class="container">
      
      <!-- Seção de Busca Ativa -->
      <div id="searchResultsSection" class="hidden">
        <div class="resultados-busca">
          <div class="resultados-contador" id="searchResultsCount"></div>
          <div id="searchResultsList"></div>
        </div>
      </div>

      <!-- Seção de Categorias -->
      <div id="categoriesSection">
        <h2 class="section-title">
          <span>📂</span>
          Categorias
        </h2>
        <div class="categorias-grid" id="categoriasGrid">
          <!-- Categorias serão carregadas via JavaScript -->
        </div>
      </div>

      <!-- Seção de Todas as Entradas -->
      <div id="allEntriesSection" class="hidden">
        <h2 class="section-title">
          <span>📄</span>
          Todas as Entradas
        </h2>
        <div class="resultados-busca">
          <div id="allEntriesList"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Memora- Sua enciclopédia colaborativa. Acesse e edite de qualquer lugar.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/supabase-client.js"></script>
  <script src="js/app-supabase.js"></script>
</body>
</html>
